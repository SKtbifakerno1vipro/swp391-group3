# Gmail SMTP Configuration
# Replace with your actual Gmail credentials

# Your Gmail address (must match sender email)
mail.smtp.user=your-email@gmail.com

# Gmail App Password (NOT your regular Gmail password)
# Generate at: https://myaccount.google.com/apppasswords
mail.smtp.key=your-app-password-here

# Sender information (must match mail.smtp.user for Gmail)
mail.sender.email=your-email@gmail.com
mail.sender.name=SWP Sales Process System